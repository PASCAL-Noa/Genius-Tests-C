name: genius

on: [push, pull_request]

jobs:
  correction:
    runs-on: windows-latest
    steps:
      - name: Checkout Candidat
        uses: actions/checkout@v4

      - name: Recuperation de la Moulinette (Tests + CMake)
        uses: actions/checkout@v4
        with:
          repository: PASCAL-Noa/Genius-Tests-C-Admin
          token: ${{ secrets.SECRET_TESTS_TOKEN }}
          path: moulinette_temp

      - name: Preparation environnement
        run: |
          Move-Item -Path moulinette_temp\test -Destination .\test
          Move-Item -Path moulinette_temp\CMakeLists.txt -Destination .\CMakeLists.txt
          Remove-Item -Recurse -Force moulinette_temp

      - name: Verification des fonctions autorisees
        run: |
          $rules = @{
              "ft_putstr" = @("write")
              "ft_putnbr" = @("write")
              "ft_strcpy" = @()
              "ft_strcapitalize" = @()
              "ft_sort_int_tab" = @()
              "ft_strdup" = @("malloc")
          }
          $keywords = @("if", "while", "for", "return", "sizeof", "switch")
          $failures = 0

          foreach ($file in Get-ChildItem -Recurse src\*.c) {
              $content = Get-Content $file.FullName -Raw
              
              # Si le fichier est vide ou null, on passe au suivant
              if ([string]::IsNullOrWhiteSpace($content)) {
                  Write-Host "Info: $($file.Name) est vide, ignorance."
                  continue
              }

              $matches = [regex]::Matches($content, '\b([a-zA-Z_]\w*)\s*\(')
              $exe_name = $file.BaseName
              $allowed = $rules[$exe_name]
              if ($null -eq $allowed) { $allowed = @() }

              foreach ($m in $matches) {
                  $func = $m.Groups[1].Value
                  if ($keywords -notcontains $func -and $func -notmatch "^ft_" -and $allowed -notcontains $func) {
                      Write-Host "KO: Fonction interdite '$func' detectee dans $($file.Name)"
                      $failures++
                  }
              }
          }
          if ($failures -gt 0) { exit 1 }

      - name: Configuration CMake
        run: cmake -B build

      - name: Compilation
        run: cmake --build build --config Release

      - name: Execution des Tests
        run: |
          $failures = 0
          foreach ($exe in Get-ChildItem build\Release\test*.exe) {
              Write-Host "Running $($exe.Name)..."
              & $exe.FullName
              if ($LASTEXITCODE -ne 0) {
                  Write-Host "RESULTAT: KO"
                  $failures++
              } else {
                  Write-Host "RESULTAT: OK"
              }
          }
          if ($failures -gt 0) { exit 1 }
